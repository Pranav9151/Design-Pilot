name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: lint + unit tests (no DB) ──────────────────────────────
  backend-unit:
    name: Backend — unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check app/ tests/ scripts/

      - name: Run unit + engineering + security tests
        run: |
          pytest tests/unit/ tests/engineering/ tests/security/ \
            -q --tb=short --strict-markers
        env:
          APP_ENV: development
          DATABASE_URL: "postgresql+asyncpg://x:x@localhost/x"
          DATABASE_URL_SYNC: "postgresql://x:x@localhost/x"
          SUPABASE_JWT_SECRET: "test-secret-at-least-32-characters-long-xxxxx"
          SECRET_KEY: "test-secret-at-least-32-characters-long-xxxxx"

  # ── Backend: integration tests (real Postgres) ───────────────────────
  backend-integration:
    name: Backend — integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: designpilot
          POSTGRES_PASSWORD: designpilot
          POSTGRES_DB: designpilot_dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Create test DB
        run: |
          psql postgresql://designpilot:designpilot@localhost:5433/designpilot_dev \
            -c "CREATE DATABASE designpilot_test;" || true
          psql postgresql://designpilot:designpilot@localhost:5433/designpilot_test \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto; CREATE EXTENSION IF NOT EXISTS vector;" || true

      - name: Run Alembic migrations
        run: alembic upgrade head
        env:
          DATABASE_URL_SYNC: "postgresql://designpilot:designpilot@localhost:5433/designpilot_test"

      - name: Run integration tests
        run: pytest tests/integration/ -q --tb=short --strict-markers
        env:
          APP_ENV: development
          DATABASE_URL: "postgresql+asyncpg://designpilot:designpilot@localhost:5433/designpilot_test"
          DATABASE_URL_SYNC: "postgresql://designpilot:designpilot@localhost:5433/designpilot_test"
          REDIS_URL: "redis://localhost:6380/0"
          SUPABASE_JWT_SECRET: "test-secret-at-least-32-characters-long-xxxxx"
          SECRET_KEY: "test-secret-at-least-32-characters-long-xxxxx"
          SANDBOX_SKIP_FOR_DEV: "true"
          ANTHROPIC_API_KEY: "dummy-key-integration-tests-use-fakes"

  # ── Frontend: TypeScript + build ────────────────────────────────────
  frontend:
    name: Frontend — type check + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: TypeScript strict check
        working-directory: frontend
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Production build
        working-directory: frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL: "https://placeholder.supabase.co"
          VITE_SUPABASE_ANON_KEY: "placeholder-anon-key"

  # ── Docker image build (no push on PRs) ─────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend-unit, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            --build-arg VITE_SUPABASE_URL="https://placeholder.supabase.co" \
            --build-arg VITE_SUPABASE_ANON_KEY="placeholder" \
            -t designpilot-mech:ci-${{ github.sha }} \
            .

      - name: Smoke test image
        run: |
          docker run -d --name smoke \
            -p 8001:8000 \
            -e DATABASE_URL="postgresql+asyncpg://x:x@localhost/x" \
            -e DATABASE_URL_SYNC="postgresql://x:x@localhost/x" \
            -e SUPABASE_JWT_SECRET="test-secret-at-least-32-characters-long-xxxxx" \
            -e SECRET_KEY="test-secret-at-least-32-characters-long-xxxxx" \
            -e REDIS_URL="redis://localhost:6379/0" \
            designpilot-mech:ci-${{ github.sha }}
          sleep 3
          curl -f http://localhost:8001/health || (docker logs smoke && exit 1)
          docker stop smoke
