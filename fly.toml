# DesignPilot MECH — Fly.io deployment config
# Deploy: fly deploy
# Secrets: fly secrets set SUPABASE_JWT_SECRET=... ANTHROPIC_API_KEY=...

app = "designpilot-mech"
primary_region = "bom"   # Mumbai — closest to India market

[build]

[env]
  APP_ENV = "production"
  PORT    = "8000"

[http_service]
  internal_port = 8000
  force_https   = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "10s"
    interval     = "15s"
    method       = "GET"
    path         = "/health"
    port         = 8000
    timeout      = "5s"
    type         = "http"
